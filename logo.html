<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TechWise Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }
    .logo-container {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #0284c7, #10b981);
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 10px 25px rgba(2, 132, 199, 0.3);
      text-align: center;
    }
    .icon {
      font-size: 110px;
      margin-bottom: 10px;
    }
    .title {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 32px;
      font-weight: 700;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="icon">📖</div>
    <div class="title">TechWise</div>
    <div class="subtitle">Tutoring</div>
  </div>
</body>
</html>
